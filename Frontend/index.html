<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCards</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Quizcards</h1>
        <button id="startQuizBtn">
            Start Quiz
        </button>
        <div id="quizContainer">

        </div>
        <form id="flashcardForm">
            <input type="text" id="question" placeholder="Enter Question" required>
            <input type="text" id="answer" placeholder="Enter Answer" required>
            <input type="text" id="category" placeholder="Enter Category" required>
            <button type="submit">Add flashcard</button>
        </form>
        <div id="flashcardsContainer"></div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
